<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplier-reg</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>NyondoStock Supplier Registration Form</h1>
      <form>
        <!-- company info -->
        <h2>Company Information</h2>
        <div class="input-section">
          <label>Company name</label>
          <input type="text" placeholder="Enter Company name" />
        </div>
        <div class="input-section">
          <label>Company registered number</label>
          <input type="text" placeholder="Enter Company registered number" />
        </div>
        <div class="input-section">
          <label>Website</label>
          <input type="text" />
        </div>
        <div class="input-section">
          <label>Business type</label>
          <select>
            <option>Select business type</option>
            <option>wholesaler</option>
            <option>importer</option>
            <option>Distributor</option>
          </select>
        </div>
        <!-- contact details -->
        <h2>Contact Details</h2>
        <div class="input-section">
          <label>Name</label>
          <input type="text" placeholder="Enter full name" />
        </div>

        <div class="input-section">
          <label>Phone number</label>
          <input type="tel" placeholder="Enter phone number" />
        </div>
        <div class="input-section">
          <label>Email</label>
          <input type="email" placeholder="Enter email" />
        </div>

        <!-- product -->
        <h2>Products Supplied</h2>
        <div class="input-section">
          <label>Products Suplied</label>
          <select>
            <option>select products</option>
            <option>Paint and Decoration</option>
            <option>Plumbing and Irrigation</option>
            <option>Tools and Equipments</option>
            <option>Electronical Materials</option>
            <option>Building Materials</option>
          </select>
        </div>
        <!-- Delivery -->
        <h2>Delivery Area</h2>
        <div class="input-section">
          <label>Address</label>
          <input type="text" placeholder="Enter your Address" />
        </div>
        <!-- payment -->
        <h2>Payment Terms</h2>
        <div class="input-section">
          <label>Payment</label>
          <select>
            <option>Select payment</option>
            <option>Cash on Delivery</option>
            <option>Mobile money</option>
            <option>Credit card</option>
          </select>
        </div>
        <!-- additional info -->
        <h2>Additional Information</h2>
        <div class="input-section">
          <label>Additional Information</label>
          <textarea row="1"></textarea>
        </div>
        <!-- declaration -->
        <h2>Declaration</h2>
        <div class="input-section">
          <label>
            <input type="checkbox" />
            I declare that the information provided is accurate and true.
          </label>
        </div>
        <div class="input-section">
          <label>Supplier Name</label>
          <input type="text" />
        </div>

        <div class="input-section">
          <label>Date</label>
          <input type="date" />
        </div>
        <!-- submit -->
        <div class="final">
          <button type="submit" class="end">Submit Register</button>
        </div>
      </form>
    </div>
  </body>
</html>
